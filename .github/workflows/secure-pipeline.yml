name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: security/.gitleaks.toml

  iac-scan:
    name: IaC Scanning (Checkov)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli
          download_external_modules: false
          skip_check: CKV_AZURE_165,CKV_AZURE_237,CKV_AZURE_139,CKV_AZURE_164,CKV_AZURE_233,CKV_AZURE_166,CKV_AZURE_163,CKV_AZURE_167,CKV2_AZURE_32

  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: iac-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devsecops-demo:${{ github.sha }} ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

  push-to-acr:
    name: Push to Azure Container Registry
    runs-on: ubuntu-latest
    needs: image-scan
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login via Workload Identity
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry acrdevsecops5prod \
            --image devsecops-demo:${{ github.sha }} \
            --image devsecops-demo:latest \
            ./app

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: push-to-acr
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login via Workload Identity
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp create \
            --name "ca-devsecops-demo" \
            --resource-group "rg-devsecops-prod" \
            --environment "cae-devsecops-prod" \
            --image "acrdevsecops5prod.azurecr.io/devsecops-demo:${{ github.sha }}" \
            --registry-server "acrdevsecops5prod.azurecr.io" \
            --registry-identity "/subscriptions/d3a79b4b-b5c9-4ed9-94b8-067ede14f5cd/resourceGroups/rg-devsecops-prod/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-devsecops-pipeline" \
            --user-assigned "/subscriptions/d3a79b4b-b5c9-4ed9-94b8-067ede14f5cd/resourceGroups/rg-devsecops-prod/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-devsecops-pipeline" \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --output none || \
          az containerapp update \
            --name "ca-devsecops-demo" \
            --resource-group "rg-devsecops-prod" \
            --image "acrdevsecops5prod.azurecr.io/devsecops-demo:${{ github.sha }}" \
            --output none

      - name: Get app URL
        run: |
          URL=$(az containerapp show \
            --name "ca-devsecops-demo" \
            --resource-group "rg-devsecops-prod" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "App deployed at: https://$URL"

  dast-scan:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
    issues: write
    contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://ca-devsecops-demo.nicestone-4067dbbd.canadacentral.azurecontainerapps.io"
          rules_file_name: security/zap-baseline.conf
          cmd_options: "-a"
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html

